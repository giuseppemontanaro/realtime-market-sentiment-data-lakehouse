services:
  producer:
    build: ./producer
    env_file: .env
    volumes:
      - ./certs:/app/certs:ro
      - ./.env:/app/.env:ro
    restart: always

  bronze-processor:
    build: 
      context: ./processors
    command: ["bronze_layer.py"]
    env_file: .env
    volumes:
      - ./processors/bronze_layer:/app/processor
      - ./certs:/app/certs:ro

